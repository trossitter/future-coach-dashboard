services:
  neo4j:
    image: neo4j:5.23
    container_name: future-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/futurepassword
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - neo4j-data:/data

  backend:
    build: ./backend
    container_name: future-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: futurepassword
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    # App source is mounted and uvicorn runs with --reload so code edits apply
    # live without an image rebuild. Bind mount overlays the COPY'd /app/app.
    volumes:
      - ./data:/app/data:ro
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/evaluation:/app/evaluation
      - fastembed-cache:/tmp/fastembed_cache   # persist the ONNX model across restarts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    image: node:20-slim
    container_name: future-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "http://localhost:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep the container's linux node_modules
    depends_on:
      - backend

volumes:
  neo4j-data:
  fastembed-cache:
